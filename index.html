<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQUIPOALDIA | Vidriera Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .product-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
        /* Cursor de lupa para indicar que se puede ampliar */
        .zoom-cursor { cursor: zoom-in; }
        /* Estilos para el Modal */
        #imageModal { display: none; }
        #imageModal.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="text-2xl font-black text-blue-700 tracking-tighter">EQUIPOALDIA</div>
        </div>
    </nav>

    <header class="bg-slate-900 py-12 px-4 text-center">
        <h1 class="text-3xl md:text-5xl font-black text-white mb-2">Equipamiento Tecnológico</h1>
        <p class="text-slate-400">Vidriera exclusiva para comercios bajo modalidad de comodato.</p>
    </header>

    <section id="catalogo" class="max-w-7xl mx-auto px-4 py-12">
        <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </section>

    <div id="imageModal" class="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4" onclick="closeModal()">
        <span class="absolute top-5 right-5 text-white text-4xl font-bold cursor-pointer">&times;</span>
        <img id="modalImg" src="" class="max-w-full max-h-full rounded-lg shadow-2xl object-contain">
    </div>

    <footer class="bg-slate-900 text-white py-12 text-center text-sm border-t border-slate-800">
        <p class="text-slate-400 px-4">Vidriera informativa. Trato presencial y contrato de comodato físico.</p>
    </footer>

    <script>
        const products = [
            {
                id: 1,
                nombre: "Motorola G05",
                desc: "Rendimiento confiable y diseño moderno.",
                ram: "4GB RAM", cpu: "Octa-Core", almacenamiento: "128GB",
                cuotaDiaria: 950,
                imagen: "img/moto-g05.jpg"
            },
            {
                id: 2,
                nombre: "Samsung Galaxy A07",
                desc: "Excelente autonomía para tu gestión.",
                ram: "4GB RAM", cpu: "Octa-Core", almacenamiento: "128GB",
                cuotaDiaria: 1050,
                imagen: "img/samsung-a07.jpg"
            },
            {
                id: 3,
                nombre: "Motorola G15",
                desc: "Potencia extra para tu negocio.",
                ram: "4GB RAM", cpu: "Octa-Core Pro", almacenamiento: "256GB",
                cuotaDiaria: 1350,
                imagen: "img/moto-g15.jpg"
            },
            {
                id: 4,
                nombre: "Samsung Galaxy A16",
                desc: "Experiencia premium y gran conectividad.",
                ram: "4GB RAM", cpu: "Octa-Core Pro", almacenamiento: "128GB",
                cuotaDiaria: 1650,
                imagen: "img/samsung-a16.jpg"
            }
        ];

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            
            products.forEach(p => {
                const card = `
                    <div class="product-card bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">
                        <div class="h-48 bg-slate-200 overflow-hidden zoom-cursor" onclick="openModal('${p.imagen}')">
                            <img src="${p.imagen}" alt="${p.nombre}" class="w-full h-full object-cover hover:scale-110 transition duration-500">
                        </div>
                        <div class="p-5 flex-grow">
                            <h3 class="font-bold text-slate-800 text-lg mb-1">${p.nombre}</h3>
                            <p class="text-slate-500 text-xs mb-4 leading-relaxed">${p.desc}</p>
                            <div class="space-y-2 mb-5">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100 pb-1">Detalles Principales</p>
                                <div class="grid grid-cols-1 gap-1 text-xs text-slate-600">
                                    <div class="flex justify-between"><span>Procesador:</span><span>${p.cpu}</span></div>
                                    <div class="flex justify-between"><span>RAM:</span><span>${p.ram}</span></div>
                                    <div class="flex justify-between"><span>Espacio:</span><span>${p.almacenamiento}</span></div>
                                </div>
                            </div>
                            <div class="bg-blue-50 py-4 rounded-xl border border-blue-100 text-center">
                                <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-1">Aporte Diario Sugerido</p>
                                <p class="text-4xl font-black text-slate-900">$${p.cuotaDiaria.toLocaleString('es-AR')}</p>
                                <p class="text-[10px] text-slate-500 mt-2 italic font-medium uppercase">30 Aportes - Comodato</p>
                            </div>
                        </div>
                        <div class="p-5 pt-0">
                            <button onclick="sendWhatsApp('${p.nombre}')" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold text-sm hover:bg-blue-700 transition flex items-center justify-center gap-2">
                                📱 Consultar disponibilidad
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        // FUNCIONES DEL MODAL
        function openModal(imgSrc) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            modalImg.src = imgSrc;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; // Evita el scroll mientras está abierto
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto'; // Devuelve el scroll
        }

        function sendWhatsApp(productName) {
            const phone = "5491122334455"; // TU NÚMERO
            const msg = encodeURIComponent(`Hola! Consulto disponibilidad del equipo *${productName}* bajo la modalidad de aporte diario.`);
            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        }

        renderProducts();
    </script>
</body>
</html>
